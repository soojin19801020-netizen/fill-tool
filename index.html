<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 数据填表工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            border-radius: 14px;
            padding: 28px 32px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
        }
        h1 {
            font-size: 24px;
            border-bottom: 2px solid #1a73e8;
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px 24px;
            background: #f8f9fb;
            padding: 14px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .toolbar label {
            font-weight: 600;
            font-size: 14px;
            color: #2c3e50;
        }
        .toolbar input,
        .toolbar select {
            padding: 6px 12px;
            border: 1.5px solid #d0d5dd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }
        .toolbar input:focus,
        .toolbar select:focus {
            border-color: #1a73e8;
        }
        .btn {
            padding: 8px 22px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: #1a73e8;
            color: #fff;
        }
        .btn-primary:hover {
            background: #1557b0;
        }
        .btn-success {
            background: #0f9d58;
            color: #fff;
        }
        .btn-success:hover {
            background: #0b7a45;
        }
        .btn-danger {
            background: #d93025;
            color: #fff;
        }
        .btn-danger:hover {
            background: #b3261e;
        }
        .log-box {
            background: #0d1117;
            color: #e6edf3;
            padding: 14px 18px;
            border-radius: 10px;
            font-family: "Consolas", monospace;
            font-size: 13px;
            line-height: 1.9;
            max-height: 200px;
            overflow-y: auto;
            margin: 12px 0 18px 0;
            white-space: pre-wrap;
        }
        .log-box .green {
            color: #3fb950;
        }
        .log-box .red {
            color: #f85149;
        }
        .log-box .blue {
            color: #58a6ff;
        }
        .log-box .dim {
            color: #8b949e;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin: 14px 0 18px 0;
        }
        .stat {
            background: #f8f9fb;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #e8ecf1;
        }
        .stat .num {
            font-size: 22px;
            font-weight: 700;
        }
        .stat .num.blue {
            color: #1a73e8;
        }
        .stat .num.green {
            color: #0f9d58;
        }
        .stat .num.orange {
            color: #e3742f;
        }
        .stat .lbl {
            font-size: 12px;
            color: #6b7a8a;
        }
        .table-wrap {
            overflow-x: auto;
            border: 1px solid #e8ecf1;
            border-radius: 10px;
            margin-top: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 600px;
        }
        table th {
            background: #f8f9fb;
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e8ecf1;
        }
        table td {
            padding: 8px 14px;
            border-bottom: 1px solid #f1f3f5;
        }
        .tag-success {
            background: #e6f4ea;
            color: #0f9d58;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .action-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
            align-items: center;
        }
        .status-text {
            font-size: 13px;
            color: #6b7a8a;
            margin-left: auto;
        }
        .log-box::-webkit-scrollbar {
            width: 5px;
        }
        .log-box::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
        }
        .indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .indicator.idle {
            background: #6b7a8a;
        }
        .indicator.running {
            background: #f9ab00;
            animation: pulse 1s infinite;
        }
        .indicator.success {
            background: #0f9d58;
        }
        .indicator.error {
            background: #d93025;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        @media (max-width: 700px) {
            .container {
                padding: 16px;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .stats {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 数据填表工具</h1>
        <div class="toolbar">
            <label>🔐 密码</label>
            <input type="password" id="password" value="QQ123" style="width:120px;">
            <label>📅 日期</label>
            <input type="date" id="targetDate" value="2026-07-16">
            <label>🔄 间隔</label>
            <select id="refreshInterval" style="padding:6px 12px;border:1.5px solid #d0d5dd;border-radius:6px;">
                <option value="60">1分钟</option>
                <option value="180" selected>3分钟</option>
                <option value="300">5分钟</option>
                <option value="600">10分钟</option>
                <option value="0">手动</option>
            </select>
            <button class="btn btn-primary" onclick="runOnce()">▶ 执行一次</button>
            <button class="btn btn-success" onclick="startAuto()">🔄 自动</button>
            <button class="btn btn-danger" onclick="stopAuto()">⏹ 停止</button>
        </div>

        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
            <span class="indicator idle" id="indicator"></span>
            <span id="statusText" style="font-size:14px;color:#6b7a8a;">就绪</span>
            <span id="lastUpdate" style="font-size:12px;color:#9aa6b5;margin-left:auto;"></span>
        </div>

        <div style="font-weight:600;font-size:15px;margin-bottom:4px;">📋 执行日志</div>
        <div class="log-box" id="logBox"><span class="dim">[系统]</span> 就绪，点击「执行一次」开始</div>

        <div class="stats">
            <div class="stat"><div class="num blue" id="sChannels">0</div><div class="lbl">渠道</div></div>
            <div class="stat"><div class="num" id="sRegister">0</div><div class="lbl">注册</div></div>
            <div class="stat"><div class="num" id="sFirst">0</div><div class="lbl">首充</div></div>
            <div class="stat"><div class="num green" id="sRecharge">0</div><div class="lbl">充值</div></div>
            <div class="stat"><div class="num orange" id="sWithdraw">0</div><div class="lbl">提现</div></div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-weight:600;font-size:15px;">📋 渠道数据</span>
            <span style="font-size:13px;color:#6b7a8a;" id="rowCount">0 行</span>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>渠道ID</th>
                        <th>注册</th>
                        <th>首充</th>
                        <th>充值</th>
                        <th>提现</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="7" style="text-align:center;color:#9aa6b5;padding:30px;">暂无数据</td></tr>
                </tbody>
            </table>
        </div>
        <div class="action-bar">
            <button class="btn btn-success" onclick="exportCSV()">⬇️ 导出CSV</button>
            <button class="btn btn-primary" onclick="copyTable()">📋 复制</button>
            <span class="status-text" id="statusText2">就绪</span>
        </div>
    </div>

    <script>
        let channels = [],
            autoTimer = null,
            isRunning = false;

        function addLog(msg, type = 'info') {
            const box = document.getElementById('logBox');
            const cls = { info: '', ok: 'green', err: 'red', warn: 'yellow' } [type] || '';
            const time = new Date().toLocaleTimeString();
            box.innerHTML += `\n[${time}] <span class="${cls}">${msg}</span>`;
            box.scrollTop = box.scrollHeight;
            const ind = document.getElementById('indicator'),
                st = document.getElementById('statusText');
            if (type === 'ok') { ind.className = 'indicator success';
                st.textContent = '✅ 成功'; } else if (type === 'err') { ind.className = 'indicator error';
                st.textContent = '❌ 失败'; }
        }

        function setStatus(type, msg) { document.getElementById('indicator').className = `indicator ${type}`;
            document.getElementById('statusText').textContent = msg; }

        function render() {
            const tbody = document.getElementById('tableBody');
            if (channels.length === 0) { tbody.innerHTML =
                    `<tr><td colspan="7" style="text-align:center;color:#9aa6b5;padding:30px;">暂无数据</td></tr>`; } else {
                let html = '';
                channels.forEach((ch, i) => {
                    const st = (ch.register || 0) > 0 && (ch.first_charge || 0) > 0 ?
                        '<span class="tag-success">✅ 活跃</span>' :
                        (ch.register || 0) > 0 ? '<span class="tag-success" style="background:#fef7e0;color:#b06500;">⚠️ 未首充</span>' :
                        '<span class="tag-success" style="background:#f1f3f5;color:#6b7a8a;">空</span>';
                    html +=
                        `<tr><td>${i+1}</td><td><strong>${ch.pack_no||ch.code||'-'}</strong></td><td>${ch.register||0}</td><td>${ch.first_charge||0}</td><td>${ch.recharge||0}</td><td>${ch.withdraw||0}</td><td>${st}</td></tr>`;
                });
                tbody.innerHTML = html;
            }
            document.getElementById('rowCount').textContent = channels.length + ' 行';
            document.getElementById('sChannels').textContent = channels.length;
            document.getElementById('sRegister').textContent = channels.reduce((s, c) => s + (c.register || 0), 0);
            document.getElementById('sFirst').textContent = channels.reduce((s, c) => s + (c.first_charge || 0), 0);
            document.getElementById('sRecharge').textContent = channels.reduce((s, c) => s + (c.recharge || 0), 0);
            document.getElementById('sWithdraw').textContent = channels.reduce((s, c) => s + (c.withdraw || 0), 0);
        }

        async function runOnce() {
            if (isRunning) return;
            isRunning = true;
            const date = document.getElementById('targetDate').value,
                pwd = document.getElementById('password').value;
            if (pwd !== 'QQ123') { addLog('❌ 密码错误', 'err');
                isRunning = false; return; }
            addLog(`🚀 抓取 ${date} 数据...`, 'info');
            setStatus('running', '抓取中...');
            try {
                const resp = await fetch('/api/fetch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date: date.replace(/-/g, '') })
                });
                const result = await resp.json();
                if (result.success) {
                    channels = result.data.map(item => ({
                        pack_no: item.pack_no,
                        register: parseInt(item.today_register_count) || 0,
                        first_charge: parseInt(item.today_count_pay_users) || 0,
                        recharge: parseFloat(item.today_pay_sum) || 0,
                        withdraw: 0
                    }));
                    render();
                    addLog(`✅ 抓取 ${channels.length} 个渠道`, 'ok');
                    setStatus('success', `${channels.length} 个渠道`);
                    document.getElementById('lastUpdate').textContent = `更新: ${new Date().toLocaleTimeString()}`;
                } else {
                    addLog(`❌ ${result.message||'失败'}`, 'err');
                    setStatus('error', '失败');
                    loadDemo();
                }
            } catch (e) {
                addLog(`⚠️ 网络错误: ${e.message}`, 'warn');
                loadDemo();
            }
            isRunning = false;
        }

        function loadDemo() {
            channels = [
                { pack_no: 90004, register: 2, first_charge: 0, recharge: 0, withdraw: 0 },
                { pack_no: 10581, register: 5, first_charge: 0, recharge: 0, withdraw: 0 },
                { pack_no: 10542, register: 15, first_charge: 1, recharge: 200, withdraw: 0 },
                { pack_no: 10072, register: 2, first_charge: 1, recharge: 50, withdraw: 0 },
                { pack_no: 10203, register: 0, first_charge: 3, recharge: 450, withdraw: 0 },
                { pack_no: 10591, register: 20, first_charge: 0, recharge: 0, withdraw: 0 },
                { pack_no: 10329, register: 0, first_charge: 1, recharge: 100, withdraw: 0 },
                { pack_no: 200005, register: 1, first_charge: 1, recharge: 82, withdraw: 0 },
            ];
            render();
            addLog('📝 演示数据已加载', 'warn');
            setStatus('success', '演示模式');
        }

        function startAuto() {
            if (autoTimer) { addLog('⚠️ 已运行中', 'warn'); return; }
            const interval = parseInt(document.getElementById('refreshInterval').value);
            if (interval === 0) { addLog('⚠️ 请选择有效间隔', 'warn'); return; }
            addLog(`🔄 自动刷新 ${interval}秒`, 'info');
            runOnce();
            autoTimer = setInterval(runOnce, interval * 1000);
            document.getElementById('statusText2').textContent = `🔄 自动 (${interval}s)`;
        }

        function stopAuto() { if (autoTimer) { clearInterval(autoTimer);
                autoTimer = null;
                addLog('⏹ 已停止', 'warn');
                document.getElementById('statusText2').textContent = '已停止'; } else { addLog('⚠️ 无运行中', 'warn'); } }

        function exportCSV() {
            if (channels.length === 0) { addLog('❌ 无数据', 'err'); return; }
            let text = '渠道ID,注册,首充,充值,提现\n';
            channels.forEach(c => text += `${c.pack_no},${c.register||0},${c.first_charge||0},${c.recharge||0},${c.withdraw||0}\n`);
            const blob = new Blob(['\uFEFF' + text], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `渠道数据_${document.getElementById('targetDate').value}.csv`;
            link.click();
            addLog('⬇️ 导出成功', 'ok');
        }

        function copyTable() {
            if (channels.length === 0) { addLog('❌ 无数据', 'err'); return; }
            let text = '渠道ID\t注册\t首充\t充值\t提现\n';
            channels.forEach(c => text += `${c.pack_no}\t${c.register||0}\t${c.first_charge||0}\t${c.recharge||0}\t${c.withdraw||0}\n`);
            navigator.clipboard.writeText(text).then(() => addLog('✅ 已复制', 'ok'))
                .catch(() => { const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    addLog('✅ 已复制', 'ok'); });
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('targetDate').value = '2026-07-16';
            loadDemo();
        });
    </script>
</body>
</html>
