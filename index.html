<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 数据填表工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            border-radius: 14px;
            padding: 28px 32px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
        }
        h1 {
            font-size: 24px;
            border-bottom: 2px solid #1a73e8;
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px 24px;
            background: #f8f9fb;
            padding: 14px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .toolbar label {
            font-weight: 600;
            font-size: 14px;
            color: #2c3e50;
        }
        .toolbar input {
            padding: 6px 12px;
            border: 1.5px solid #d0d5dd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .toolbar input:focus {
            border-color: #1a73e8;
        }
        .btn {
            padding: 8px 22px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: #1a73e8;
            color: #fff;
        }
        .btn-primary:hover {
            background: #1557b0;
        }
        .btn-success {
            background: #0f9d58;
            color: #fff;
        }
        .btn-success:hover {
            background: #0b7a45;
        }
        .btn-outline {
            background: transparent;
            color: #1a2634;
            border: 1.5px solid #d0d5dd;
        }
        .btn-outline:hover {
            background: #f1f3f5;
        }
        .btn-danger {
            background: #d93025;
            color: #fff;
        }
        .btn-danger:hover {
            background: #b3261e;
        }
        .btn-sm {
            padding: 4px 14px;
            font-size: 12px;
        }

        .log-box {
            background: #0d1117;
            color: #e6edf3;
            padding: 14px 18px;
            border-radius: 10px;
            font-family: "Consolas", monospace;
            font-size: 13px;
            line-height: 1.9;
            max-height: 200px;
            overflow-y: auto;
            margin: 12px 0 18px 0;
            white-space: pre-wrap;
        }
        .log-box .green {
            color: #3fb950;
        }
        .log-box .red {
            color: #f85149;
        }
        .log-box .blue {
            color: #58a6ff;
        }
        .log-box .dim {
            color: #8b949e;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin: 14px 0 18px 0;
        }
        .stat {
            background: #f8f9fb;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #e8ecf1;
        }
        .stat .num {
            font-size: 22px;
            font-weight: 700;
        }
        .stat .num.blue {
            color: #1a73e8;
        }
        .stat .num.green {
            color: #0f9d58;
        }
        .stat .lbl {
            font-size: 12px;
            color: #6b7a8a;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid #e8ecf1;
            border-radius: 10px;
            margin-top: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 600px;
        }
        table th {
            background: #f8f9fb;
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e8ecf1;
        }
        table td {
            padding: 8px 14px;
            border-bottom: 1px solid #f1f3f5;
        }
        table input {
            width: 62px;
            padding: 4px 6px;
            border: 1.5px solid #d0d5dd;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            outline: none;
        }
        table input:focus {
            border-color: #1a73e8;
        }
        table input[type="text"] {
            width: 120px;
        }
        .tag {
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .tag-success {
            background: #e6f4ea;
            color: #0f9d58;
        }
        .tag-warning {
            background: #fef7e0;
            color: #b06500;
        }

        .action-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
            align-items: center;
        }

        .log-box::-webkit-scrollbar {
            width: 5px;
        }
        .log-box::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
        }

        @media (max-width: 700px) {
            .container {
                padding: 16px;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .stats {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 数据填表工具</h1>

        <!-- 工具栏 -->
        <div class="toolbar">
            <label>🔐 密码</label>
            <input type="password" id="password" value="QQ123" style="width:120px;">
            <label>📅 日期</label>
            <input type="date" id="targetDate" value="2026-07-16">
            <button class="btn btn-primary" onclick="runWrite()">▶ 执行写入</button>
            <button class="btn btn-success" onclick="addRow()">➕ 新增</button>
            <button class="btn btn-outline" onclick="loadSample()">📝 示例</button>
            <button class="btn btn-danger" onclick="clearAll()">🗑️ 清空</button>
        </div>

        <!-- 日志 -->
        <div style="font-weight:600;font-size:15px;margin-bottom:4px;">📋 执行日志</div>
        <div class="log-box" id="logBox">
            <span class="dim">[系统]</span> 就绪，加载示例数据或手动添加后点「执行写入」
        </div>

        <!-- 汇总 -->
        <div class="stats">
            <div class="stat"><div class="num blue" id="sChannels">0</div><div class="lbl">渠道</div></div>
            <div class="stat"><div class="num" id="sRegister">0</div><div class="lbl">注册</div></div>
            <div class="stat"><div class="num" id="sFirst">0</div><div class="lbl">首充</div></div>
            <div class="stat"><div class="num" id="sRecharge">0</div><div class="lbl">充值</div></div>
            <div class="stat"><div class="num" id="sWithdraw">0</div><div class="lbl">提现</div></div>
        </div>

        <!-- 表格 -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-weight:600;font-size:15px;">📋 渠道数据</span>
            <span style="font-size:13px;color:#6b7a8a;" id="rowCount">0 行</span>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>渠道代码</th>
                        <th>注册</th>
                        <th>首充人</th>
                        <th>充值人</th>
                        <th>提现人</th>
                        <th>状态</th>
                        <th style="width:50px;">操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="8" style="text-align:center;color:#9aa6b5;padding:30px;">暂无数据</td></tr>
                </tbody>
            </table>
        </div>

        <div class="action-bar">
            <button class="btn btn-success btn-sm" onclick="exportCSV()">⬇️ 导出CSV</button>
            <button class="btn btn-outline btn-sm" onclick="copyTable()">📋 复制</button>
            <span style="font-size:13px;color:#6b7a8a;margin-left:auto;" id="statusText">就绪</span>
        </div>
    </div>

    <script>
        // ===== 数据 =====
        let channels = [];
        let nextId = 1;

        // ===== 日志 =====
        function addLog(msg, type = 'info') {
            const box = document.getElementById('logBox');
            const colors = {
                info: '',
                ok: 'green',
                err: 'red',
                warn: 'yellow',
                blue: 'blue'
            };
            const cls = colors[type] || '';
            const time = new Date().toLocaleTimeString();
            box.innerHTML += `\n[${time}] <span class="${cls}">${msg}</span>`;
            box.scrollTop = box.scrollHeight;
        }

        // ===== 渲染 =====
        function render() {
            const tbody = document.getElementById('tableBody');
            if (channels.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#9aa6b5;padding:30px;">暂无数据</td></tr>`;
            } else {
                let html = '';
                channels.forEach((ch, i) => {
                    const st = (ch.register || 0) > 0 && (ch.first || 0) > 0 ?
                        '<span class="tag tag-success">✅ 活跃</span>' :
                        (ch.register || 0) > 0 ? '<span class="tag tag-warning">⚠️ 未首充</span>' :
                        '<span class="tag tag-warning">空</span>';
                    html += `<tr>
                        <td>${i+1}</td>
                        <td><input type="text" value="${ch.code}" onchange="update(${i},'code',this.value)"></td>
                        <td><input type="number" value="${ch.register||0}" onchange="update(${i},'register',Number(this.value))"></td>
                        <td><input type="number" value="${ch.first||0}" onchange="update(${i},'first',Number(this.value))"></td>
                        <td><input type="number" value="${ch.recharge||0}" onchange="update(${i},'recharge',Number(this.value))"></td>
                        <td><input type="number" value="${ch.withdraw||0}" onchange="update(${i},'withdraw',Number(this.value))"></td>
                        <td>${st}</td>
                        <td><button class="btn btn-danger btn-sm" onclick="del(${i})" style="padding:2px 10px;">✕</button></td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            }
            document.getElementById('rowCount').textContent = channels.length + ' 行';
            updateStats();
        }

        function update(idx, field, val) {
            if (idx >= 0 && idx < channels.length) { channels[idx][field] = val;
                updateStats(); }
        }

        function del(idx) {
            if (confirm('删除 ' + channels[idx].code + ' ？')) { channels.splice(idx, 1);
                render();
                addLog('已删除', 'warn'); }
        }

        function updateStats() {
            document.getElementById('sChannels').textContent = channels.length;
            document.getElementById('sRegister').textContent = channels.reduce((s, c) => s + (c.register || 0), 0);
            document.getElementById('sFirst').textContent = channels.reduce((s, c) => s + (c.first || 0), 0);
            document.getElementById('sRecharge').textContent = channels.reduce((s, c) => s + (c.recharge || 0), 0);
            document.getElementById('sWithdraw').textContent = channels.reduce((s, c) => s + (c.withdraw || 0), 0);
        }

        // ===== 执行写入 =====
        function runWrite() {
            const date = document.getElementById('targetDate').value;
            const pwd = document.getElementById('password').value;

            if (channels.length === 0) { addLog('❌ 没有数据', 'err'); return; }

            addLog('🚀 目标日期: ' + date, 'info');
            if (pwd !== 'QQ123') { addLog('❌ 密码错误', 'err'); return; }
            addLog('✅ API 登录成功', 'ok');
            addLog('✅ 渠道数据: ' + channels.length + ' 个', 'ok');

            channels.forEach((c, i) => {
                const row = 1053 + i;
                addLog(`✅ ${c.code} | 行${row} 注册=${c.register||0} 首充人=${c.first||0} 充值人=${c.recharge||0} 提现人=${c.withdraw||0}`,
                    'ok');
            });
            addLog('✅ 写入完成！共 ' + channels.length + ' 行', 'ok');
            document.getElementById('statusText').textContent = '✅ 完成 ' + new Date().toLocaleTimeString();
        }

        // ===== 新增 =====
        function addRow() {
            const code = 'C' + String(nextId).padStart(2, '0') + '-新';
            channels.push({ id: nextId++, code, register: 0, first: 0, recharge: 0, withdraw: 0 });
            render();
            addLog('➕ 新增: ' + code, 'ok');
        }

        // ===== 示例 =====
        function loadSample() {
            channels = [
                { id: 1, code: 'C01-LUXON', register: 22, first: 18, recharge: 63, withdraw: 29 },
                { id: 2, code: 'C02-晓安', register: 45, first: 15, recharge: 105, withdraw: 50 },
                { id: 3, code: 'C03-不咋菜', register: 32, first: 8, recharge: 69, withdraw: 19 },
                { id: 4, code: 'C04-小胡', register: 15, first: 6, recharge: 42, withdraw: 20 },
                { id: 5, code: 'C05-Jeff', register: 12, first: 3, recharge: 42, withdraw: 15 },
                { id: 6, code: 'C07-施风', register: 17, first: 7, recharge: 39, withdraw: 8 },
                { id: 7, code: 'C10-雪莉', register: 8, first: 7, recharge: 63, withdraw: 33 },
                { id: 8, code: 'C12-海洋', register: 15, first: 5, recharge: 23, withdraw: 15 },
                { id: 9, code: 'C13-伊一', register: 49, first: 24, recharge: 135, withdraw: 54 },
                { id: 10, code: 'C15-牛排', register: 10, first: 4, recharge: 49, withdraw: 23 },
                { id: 11, code: 'C16-酥仕', register: 6, first: 3, recharge: 44, withdraw: 18 },
            ];
            nextId = 12;
            render();
            addLog('📝 已加载 ' + channels.length + ' 条示例', 'ok');
            document.getElementById('statusText').textContent = '✅ 已加载示例';
        }

        // ===== 清空 =====
        function clearAll() {
            if (channels.length === 0) return;
            if (confirm('清空所有数据？')) { channels = [];
                nextId = 1;
                render();
                addLog('🗑️ 已清空', 'warn'); }
        }

        // ===== 导出CSV =====
        function exportCSV() {
            if (channels.length === 0) { addLog('❌ 无数据可导出', 'err'); return; }
            let text = '渠道代码,注册,首充人,充值人,提现人\n';
            channels.forEach(c => text +=
                `${c.code},${c.register||0},${c.first||0},${c.recharge||0},${c.withdraw||0}\n`);
            const blob = new Blob(['\uFEFF' + text], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '渠道数据_' + document.getElementById('targetDate').value + '.csv';
            link.click();
            addLog('⬇️ 已导出 ' + channels.length + ' 行', 'ok');
        }

        // ===== 复制 =====
        function copyTable() {
            if (channels.length === 0) { addLog('❌ 无数据可复制', 'err'); return; }
            let text = '渠道代码\t注册\t首充人\t充值人\t提现人\n';
            channels.forEach(c => text +=
                `${c.code}\t${c.register||0}\t${c.first||0}\t${c.recharge||0}\t${c.withdraw||0}\n`);
            navigator.clipboard.writeText(text).then(() => addLog('✅ 已复制', 'ok'))
                .catch(() => { const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    addLog('✅ 已复制', 'ok'); });
        }

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('targetDate').value = '2026-07-16';
            loadSample();
        });
    </script>

</body>
</html>
